<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R Cloud | Secure Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans p-6 md:p-12 min-h-screen flex flex-col items-center">
    
    <div class="w-full max-w-3xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold text-blue-400">☁️ R Cloud</h1>
            <button id="logoutBtn" onclick="logout()" class="hidden text-sm bg-red-500 hover:bg-red-600 text-white py-1 px-4 rounded transition">
                Logout
            </button>
        </div>
        
        <div id="authView" class="bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700 max-w-md mx-auto mt-10">
            <h2 class="text-2xl font-semibold mb-6 text-center">Enter the Vault</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Username</label>
                    <input type="text" id="username" class="w-full bg-gray-900 border border-gray-600 rounded-md py-2 px-3 text-white focus:outline-none focus:border-blue-500" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" class="w-full bg-gray-900 border border-gray-600 rounded-md py-2 px-3 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••">
                </div>
                
                <p id="authStatus" class="text-sm font-medium text-center h-4"></p>

                <div class="flex space-x-3 pt-2">
                    <button onclick="login()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-md transition">
                        Login
                    </button>
                    <button onclick="register()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded-md transition border border-gray-600">
                        Register
                    </button>
                </div>
            </div>
        </div>

        <div id="dashboardView" class="hidden">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-8">
                <h2 class="text-xl font-semibold mb-4">Secure Upload</h2>
                <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-4">
                    <input type="file" id="fileInput" 
                        class="block w-full text-sm text-gray-400 
                               file:mr-4 file:py-2 file:px-4 
                               file:rounded-md file:border-0 
                               file:text-sm file:font-bold 
                               file:bg-blue-600 file:text-white 
                               hover:file:bg-blue-500 cursor-pointer transition"/>
                    <button onclick="uploadFile()" 
                        class="w-full sm:w-auto bg-green-500 hover:bg-green-400 text-gray-900 font-bold py-2 px-8 rounded-md shadow transition">
                        Upload
                    </button>
                </div>
                <p id="uploadStatus" class="mt-3 text-sm font-medium"></p>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Your Private Files</h2>
                <ul id="fileList" class="space-y-3">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // --- DOM Elements ---
        const authView = document.getElementById('authView');
        const dashboardView = document.getElementById('dashboardView');
        const logoutBtn = document.getElementById('logoutBtn');
        const authStatus = document.getElementById('authStatus');
        
        // --- View Toggler ---
        function showDashboard() {
            authView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            fetchFiles();
        }

        function showAuth() {
            dashboardView.classList.add('hidden');
            logoutBtn.classList.add('hidden');
            authView.classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // --- Auth Logic ---
        async function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            authStatus.textContent = "⏳ Registering...";
            authStatus.className = "text-sm font-medium text-center h-4 text-blue-400";
            
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                
                if (data.success) {
                    authStatus.textContent = "✅ Registered! You can now login.";
                    authStatus.className = "text-sm font-medium text-center h-4 text-green-400";
                } else {
                    authStatus.textContent = "❌ " + data.error;
                    authStatus.className = "text-sm font-medium text-center h-4 text-red-400";
                }
            } catch (err) {
                authStatus.textContent = "❌ Server error.";
            }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            authStatus.textContent = "⏳ Logging in...";
            
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                
                if (data.success) {
                    authStatus.textContent = "";
                    showDashboard();
                } else {
                    authStatus.textContent = "❌ " + data.error;
                    authStatus.className = "text-sm font-medium text-center h-4 text-red-400";
                }
            } catch (err) {
                authStatus.textContent = "❌ Server error.";
            }
        }

        async function logout() {
            await fetch(`${API_URL}/logout`, { method: 'POST' });
            showAuth();
        }

        // --- File System Logic ---
        async function fetchFiles() {
            try {
                const res = await fetch(`${API_URL}/files`);
                
                // If the backend rejects us, our token is missing or expired. Boot back to login.
                if (res.status === 401 || res.status === 403) {
                    showAuth();
                    return;
                }

                const data = await res.json();
                const list = document.getElementById('fileList');
                list.innerHTML = ''; 
                
                if (data.files.length === 0) {
                    list.innerHTML = '<li class="text-gray-500 text-sm italic">Vault is empty.</li>';
                    return;
                }

                data.files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-gray-900 p-4 rounded-lg border border-gray-700";
                    // Notice we use file.id for deletion now, matching the new backend logic!
                    li.innerHTML = `
                        <div class="flex items-center space-x-3 overflow-hidden">
                            <span class="text-xl shrink-0">📄</span>
                            <span class="font-medium text-gray-200 truncate">${file.name}</span>
                            <span class="text-xs text-gray-500 px-2 py-1 bg-gray-800 rounded shrink-0">
                                ${(file.size / 1024).toFixed(1)} KB
                            </span>
                        </div>
                        <button onclick="deleteFile('${file.id}')" 
                            class="shrink-0 text-red-400 hover:text-red-300 font-semibold text-sm transition ml-4">
                            Delete
                        </button>
                    `;
                    list.appendChild(li);
                });
            } catch (err) {
                document.getElementById('fileList').innerHTML = '<li class="text-red-400">Failed to connect to server.</li>';
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('uploadStatus');
            
            if (fileInput.files.length === 0) {
                status.textContent = "⚠️ Please select a file first.";
                status.className = "mt-3 text-sm font-medium text-yellow-400";
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            status.textContent = "⏳ Encrypting into vault...";
            status.className = "mt-3 text-sm font-medium text-blue-400";

            try {
                const res = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                // If token expired during upload
                if (res.status === 401 || res.status === 403) return showAuth();

                const result = await res.json();
                if (result.success) {
                    status.textContent = "✅ " + result.message;
                    status.className = "mt-3 text-sm font-medium text-green-400";
                    fileInput.value = ''; 
                    fetchFiles(); 
                } else {
                    status.textContent = "❌ Upload failed.";
                    status.className = "mt-3 text-sm font-medium text-red-400";
                }
            } catch (err) {
                status.textContent = "❌ Network error.";
                status.className = "mt-3 text-sm font-medium text-red-400";
            }
        }

        async function deleteFile(id) {
            if(!confirm(`Are you sure you want to permanently delete this file?`)) return;
            
            try {
                const res = await fetch(`${API_URL}/delete/${id}`, { method: 'DELETE' });
                if (res.status === 401 || res.status === 403) return showAuth();
                fetchFiles(); 
            } catch (err) {
                console.error(err);
            }
        }

        // On initial load, try to fetch files. If we have a valid cookie, it bypasses login!
        fetchFiles();
    </script>
</body>
</html>
