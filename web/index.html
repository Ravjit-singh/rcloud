<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drive - R Cloud</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'md-bg': '#131314',
                        'md-surface': '#1e1f20',
                        'md-hover': '#282a2c',
                        'md-text': '#e3e3e3',
                        'md-text-muted': '#c4c7c5',
                        'md-accent': '#a8c7fa',
                        'md-active': '#004a77',
                        'md-fab': '#c2e7ff',
                        'md-fab-text': '#001d35'
                    },
                    fontFamily: { sans: ['Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { letter-spacing: 0.01em; }
        .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-rounded.filled { font-variation-settings: 'FILL' 1; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444746; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #c4c7c5; }
    </style>
</head>
<body class="bg-md-bg text-md-text font-sans h-screen overflow-hidden flex flex-col selection:bg-md-active selection:text-md-accent">

    <div id="authView" class="fixed inset-0 z-50 bg-md-bg flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-md-surface p-10 rounded-[28px] w-full max-w-[400px]">
            <div class="flex flex-col items-center mb-8">
                <span class="material-symbols-rounded filled text-[48px] text-md-accent mb-2">cloud</span>
                <h2 class="text-[24px] font-medium text-md-text">R Cloud</h2>
                <p class="text-md-text-muted mt-1 text-sm">Sign in to your secure vault</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="username" class="w-full bg-md-bg border border-[#444746] rounded-[4px] py-4 px-4 text-md-text focus:outline-none focus:border-md-accent focus:border-2 transition-all" placeholder="Username">
                <input type="password" id="password" class="w-full bg-md-bg border border-[#444746] rounded-[4px] py-4 px-4 text-md-text focus:outline-none focus:border-md-accent focus:border-2 transition-all" placeholder="Password">
                <p id="authStatus" class="text-sm font-medium text-red-400 h-4"></p>
                
                <div class="flex justify-between items-center pt-4">
                    <button id="registerBtn" class="text-md-accent font-medium hover:bg-md-hover py-2 px-4 rounded-full transition">Create account</button>
                    <button id="loginBtn" class="bg-md-accent text-md-fab-text font-medium py-2 px-6 rounded-full hover:bg-md-fab transition">Next</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboardView" class="hidden h-full flex flex-col opacity-0 transition-opacity duration-300">
        <header class="h-[64px] flex items-center justify-between px-2 md:px-4 shrink-0">
            <div class="flex items-center space-x-2 w-auto md:w-64">
                <button class="p-2 hover:bg-md-hover rounded-full transition text-md-text md:hidden flex items-center">
                    <span class="material-symbols-rounded">menu</span>
                </button>
                <div class="flex items-center space-x-2 pl-2">
                    <span class="material-symbols-rounded filled text-[32px] md:text-[40px] text-md-accent">cloud</span>
                    <span class="text-[22px] font-medium text-md-text hidden sm:block">R Cloud</span>
                </div>
            </div>
            
            <div class="flex-1 max-w-[720px] bg-md-hover rounded-full flex items-center px-2 py-1 h-[48px] focus-within:bg-md-surface focus-within:shadow-md transition mx-2">
                <button class="p-2 rounded-full text-md-text-muted hover:bg-[#444746] transition flex items-center">
                    <span class="material-symbols-rounded">search</span>
                </button>
                <input type="text" placeholder="Search in Drive" class="bg-transparent border-none outline-none w-full text-md-text placeholder-md-text-muted px-2 h-full text-[16px]">
            </div>

            <div class="flex items-center space-x-1 pr-2">
                <button id="logoutBtn" class="p-2 hover:bg-md-hover rounded-full transition text-md-text-muted flex items-center" title="Logout">
                    <span class="material-symbols-rounded">logout</span>
                </button>
                <div class="relative ml-2">
                    <button id="profileBtn" class="w-9 h-9 rounded-full bg-[#004a77] flex items-center justify-center hover:ring-2 ring-md-accent transition">
                        <span id="profileInitial" class="text-md-accent font-medium text-sm">U</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-64 shrink-0 flex-col hidden md:flex">
                <div class="px-4 py-3">
                    <button id="newBtn" class="bg-md-surface hover:bg-md-hover text-md-text font-medium rounded-[16px] py-4 px-5 shadow-[0_1px_3px_rgba(0,0,0,0.3)] flex items-center transition w-[140px]">
                        <span class="material-symbols-rounded mr-3 text-[24px]">add</span>
                        <span class="text-[14px]">New</span>
                    </button>
                </div>
                <nav class="flex-1 px-3 space-y-1">
                    <button class="w-full flex items-center bg-md-active text-md-accent px-4 py-2.5 rounded-full font-medium text-[14px] transition">
                        <span class="material-symbols-rounded filled mr-3">hard_drive</span> My Drive
                    </button>
                </nav>
                <div id="uploadStatus" class="p-4 text-sm text-md-accent font-medium text-center opacity-0 transition-opacity"></div>
            </aside>

            <main class="flex-1 bg-md-surface md:rounded-[24px] md:m-2 md:mt-0 md:mr-4 flex flex-col overflow-hidden relative">
                <div class="shrink-0 px-6 py-4 flex items-center text-[18px] text-md-text border-b border-md-bg/30">
                    <button class="hover:bg-md-hover px-3 py-1.5 -ml-3 rounded-[8px] transition flex items-center">
                        <span class="font-medium">My Drive</span>
                        <span class="material-symbols-rounded ml-1 text-md-text-muted">arrow_drop_down</span>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto p-6">
                    <h3 class="text-[14px] font-medium text-md-text mb-3">Files</h3>
                    <div id="filesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 pb-12">
                        </div>
                </div>
            </main>
        </div>
    </div>
    
    <input type="file" id="hiddenFileInput" class="hidden">

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
