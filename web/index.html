<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R Cloud | Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#111111] text-gray-200 font-sans h-screen overflow-hidden flex flex-col">

    <!-- ================= AUTH SCREEN ================= -->
    <div id="authView" class="fixed inset-0 z-50 bg-[#111111] flex items-center justify-center">
        <div class="bg-[#1e1e1e] p-8 rounded-xl shadow-2xl border border-gray-800 w-full max-w-sm">
            <div class="flex justify-center mb-6">
                <span class="text-4xl">☁️</span>
            </div>
            <h2 class="text-2xl font-medium mb-6 text-center text-gray-100">Sign in to R Cloud</h2>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-md py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition" placeholder="Username">
                <input type="password" id="password" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-md py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition" placeholder="Password">
                <p id="authStatus" class="text-sm font-medium text-center h-4 text-red-400"></p>
                <div class="flex space-x-3 pt-4">
                    <button id="loginBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-full transition">Login</button>
                    <button id="registerBtn" class="flex-1 bg-transparent hover:bg-gray-800 text-blue-400 font-medium py-2.5 rounded-full border border-gray-700 transition">Register</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= GOOGLE DRIVE LAYOUT ================= -->
    <div id="dashboardView" class="hidden h-full flex flex-col">
        
        <!-- Top Navbar -->
        <header class="h-16 flex items-center justify-between px-4 lg:px-6 bg-[#111111]">
            <div class="flex items-center space-x-3 w-1/4">
                <span class="text-3xl">☁️</span>
                <span class="text-xl font-medium text-gray-100 hidden sm:block">R Cloud</span>
            </div>
            
            <!-- Search Bar -->
            <div class="flex-1 max-w-2xl bg-[#2a2a2a] rounded-full flex items-center px-4 py-2 focus-within:bg-[#333333] transition shadow-inner border border-transparent focus-within:border-gray-600">
                <span class="text-gray-400 text-lg mr-3">🔍</span>
                <input type="text" placeholder="Search in Drive" class="bg-transparent border-none outline-none w-full text-gray-100 placeholder-gray-400">
            </div>

            <!-- Profile Dropdown -->
            <div class="w-1/4 flex justify-end relative">
                <button id="profileBtn" class="w-10 h-10 rounded-full bg-blue-600 text-white font-bold flex items-center justify-center hover:ring-2 ring-gray-500 transition">
                    <span id="profileInitial">A</span>
                </button>
                
                <!-- Dropdown Menu -->
                <div id="profileMenu" class="hidden absolute top-12 right-0 w-48 bg-[#1e1e1e] border border-gray-700 rounded-lg shadow-xl py-2 z-50">
                    <div class="px-4 py-2 border-b border-gray-700">
                        <p id="profileName" class="text-sm font-medium text-white">Admin</p>
                    </div>
                    <button id="logoutBtn" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-gray-700 transition">Sign out</button>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="flex-1 flex overflow-hidden">
            
            <!-- Left Sidebar -->
            <aside class="w-64 flex-shrink-0 flex flex-col p-4 space-y-2 hidden md:flex">
                <button id="newBtn" class="bg-white hover:bg-gray-200 text-gray-900 font-medium rounded-2xl py-3 px-5 mb-4 shadow-lg flex items-center w-max transition">
                    <span class="text-xl mr-2">➕</span> New
                </button>
                <button class="flex items-center space-x-3 bg-[#2a2a2a] text-white px-4 py-2 rounded-full font-medium">
                    <span>🏠</span> <span>My Drive</span>
                </button>
                <button class="flex items-center space-x-3 hover:bg-[#2a2a2a] text-gray-300 px-4 py-2 rounded-full font-medium transition">
                    <span>⭐</span> <span>Starred</span>
                </button>
                <button class="flex items-center space-x-3 hover:bg-[#2a2a2a] text-gray-300 px-4 py-2 rounded-full font-medium transition">
                    <span>🗑️</span> <span>Trash</span>
                </button>
                
                <!-- Storage Meter -->
                <div class="mt-auto pt-4 px-4 border-t border-gray-800">
                    <p class="text-xs text-gray-400 mb-2">Storage</p>
                    <div class="w-full bg-gray-700 rounded-full h-1.5 mb-1">
                        <div class="bg-blue-500 h-1.5 rounded-full" style="width: 15%"></div>
                    </div>
                    <p class="text-xs text-gray-400">1.2 GB of 500 GB used</p>
                </div>
            </aside>

            <!-- Main Content Area (Files & Folders Grid) -->
            <main class="flex-1 bg-[#1e1e1e] rounded-tl-2xl overflow-y-auto border-t border-l border-gray-800 p-6">
                <!-- Breadcrumb Navigation -->
                <div class="flex items-center text-lg font-medium text-gray-200 mb-6">
                    <span id="breadcrumbRoot" class="cursor-pointer hover:underline">My Drive</span>
                    <!-- Nested folders will be injected here -->
                </div>

                <!-- Folders Section -->
                <h3 class="text-sm font-medium text-gray-400 mb-3">Folders</h3>
                <div id="foldersGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 mb-8">
                    <!-- Folder cards injected here -->
                </div>

                <!-- Files Section -->
                <h3 class="text-sm font-medium text-gray-400 mb-3">Files</h3>
                <div id="filesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <!-- File cards injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden File Input for uploads -->
    <input type="file" id="hiddenFileInput" class="hidden" multiple>

    <!-- Import our modular scripts in the correct order -->
    <script src="/js/state.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
