<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - R Cloud</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'md-bg': 'var(--md-bg, #131314)',
                        'md-surface': 'var(--md-surface, #1e1f20)',
                        'md-surface-container': 'var(--md-hover, #282a2c)',
                        'md-on-surface': 'var(--md-text, #e3e3e3)',
                        'md-on-surface-variant': 'var(--md-text-muted, #c4c7c5)',
                        'md-outline': 'var(--md-hover, #444746)',
                        'md-primary': 'var(--md-accent, #a8c7fa)',
                        'md-on-primary': 'var(--md-bg, #062e6f)',
                        'md-primary-container': 'var(--md-active, #004a77)',
                        'md-on-primary-container': 'var(--md-fab, #c2e7ff)',
                        'md-error': '#f2b8b5',
                        'md-error-container': '#8c1d18',
                        'md-on-error-container': '#f9dedc'
                    },
                    fontFamily: { 
                        sans: ['Roboto', 'sans-serif'],
                        google: ['"Google Sans"', 'Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <script src="/js/theme.js"></script>
    
    <style>
        body { 
            overscroll-behavior-y: none; 
        }
        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
        }
        .material-symbols-rounded.filled { 
            font-variation-settings: 'FILL' 1; 
        }
        
        ::-webkit-scrollbar { width: 14px; height: 14px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background-color: var(--md-text-muted, rgba(255,255,255,0.3)); 
            border: 4px solid var(--md-surface, #1e1f20);
            border-radius: 8px; 
        }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--md-text, rgba(255,255,255,0.5)); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-md-bg text-md-on-surface font-sans h-screen overflow-hidden flex flex-col selection:bg-md-primary-container selection:text-md-on-primary-container relative">

    <header class="h-[64px] flex items-center justify-between px-4 shrink-0 relative w-full border-b border-md-outline/30 md:border-transparent z-[70]">
        <div class="flex items-center w-auto md:w-[238px] shrink-0">
            <!-- Hamburger button wired to the ui.js sliding drawer -->
            <button onclick="ui.toggleSidebar()" class="md:hidden p-2 hover:bg-md-surface-container rounded-full transition text-md-on-surface-variant flex items-center mr-2">
                <span class="material-symbols-rounded text-[24px]">menu</span>
            </button>
            <div class="flex items-center space-x-2 cursor-pointer rounded-lg px-2 py-1 hover:bg-md-surface-container transition" onclick="window.location.href='/'">
                <!-- Removed Cloud Icon per request -->
                <span class="text-[22px] font-google font-normal text-md-on-surface tracking-[-0.5px]">R Cloud</span>
            </div>
        </div>
        
        <div class="hidden md:flex flex-1 max-w-[720px] bg-md-surface-container h-[48px] rounded-full items-center px-2 border border-transparent focus-within:bg-md-surface focus-within:border-md-outline focus-within:shadow-md transition-all mx-4 group">
            <button class="p-2 rounded-full text-md-on-surface-variant group-focus-within:text-md-on-surface flex items-center">
                <span class="material-symbols-rounded">search</span>
            </button>
            <input type="text" placeholder="Search in R Cloud" class="flex-1 bg-transparent border-none outline-none text-md-on-surface placeholder:text-md-on-surface-variant text-[16px]" disabled>
        </div>

        <div class="flex items-center space-x-2 pr-2 shrink-0">
            <button class="hidden sm:flex p-2 hover:bg-md-surface-container rounded-full transition text-md-on-surface-variant items-center">
                <span class="material-symbols-rounded">help</span>
            </button>
            <button class="hidden sm:flex p-2 hover:bg-md-surface-container rounded-full transition text-md-on-surface-variant items-center mr-2">
                <span class="material-symbols-rounded">apps</span>
            </button>
            <div class="w-9 h-9 rounded-full bg-md-primary-container hover:ring-4 hover:ring-md-surface-container flex items-center justify-center cursor-pointer transition-all">
                <span id="headerInitial" class="text-md-on-primary-container font-google font-medium text-sm">U</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden w-full relative">
        
        <!-- Mobile Sidebar Overlay Backdrop -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-[80] hidden md:hidden transition-opacity opacity-0" onclick="ui.toggleSidebar(true)"></div>

        <!-- Sidebar / Mobile Sliding Drawer -->
        <aside id="mainSidebar" class="fixed inset-y-0 left-0 z-[90] w-[256px] bg-md-bg transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 md:flex flex-col shadow-2xl md:shadow-none border-r border-md-outline/30 md:border-transparent h-full shrink-0 pl-3 pr-4 py-2">
            
            <!-- Mobile Sidebar Header -->
            <div class="md:hidden flex items-center px-4 py-4 border-b border-md-outline/30 shrink-0 mb-2">
                <span class="text-[20px] font-google font-medium text-md-on-surface tracking-[-0.5px]">R Cloud</span>
            </div>

            <button class="w-[105px] h-[56px] bg-md-surface-container hover:brightness-110 hover:shadow-md text-md-on-surface rounded-2xl flex items-center justify-center gap-2 mb-4 transition-all shadow-sm border border-transparent ml-1">
                <span class="material-symbols-rounded text-[24px]">add</span>
                <span class="font-google font-medium text-[14px]">New</span>
            </button>

            <nav class="flex-1 space-y-1 overflow-y-auto">
                <button onclick="window.location.href='/'" class="w-full flex items-center text-md-on-surface hover:bg-md-surface-container px-4 py-[10px] rounded-full text-[14px] transition">
                    <span class="material-symbols-rounded mr-3 text-[20px] text-md-on-surface-variant">hard_drive</span> 
                    <span class="font-google">My Drive</span>
                </button>
                <button onclick="window.location.href='/settings.html'" class="w-full flex items-center bg-md-primary-container text-md-on-primary-container px-4 py-[10px] rounded-full text-[14px] transition">
                    <span class="material-symbols-rounded filled mr-3 text-[20px]">settings</span> 
                    <span class="font-google font-medium">Settings</span>
                </button>
                <!-- Master Control Link added securely -->
                <button onclick="window.location.href='/admin.html'" class="w-full flex items-center text-md-on-surface hover:bg-md-surface-container px-4 py-[10px] rounded-full text-[14px] transition mt-2">
                    <span class="material-symbols-rounded mr-3 text-[20px] text-md-on-surface-variant">admin_panel_settings</span> 
                    <span class="font-google font-medium">Master Control</span>
                </button>
            </nav>

            <!-- Live Storage Quota Tracker -->
            <div class="p-2 shrink-0 border-t border-md-outline/30 mt-4 md:border-none md:pb-6">
                <div class="flex items-center text-md-on-surface mb-2 px-2">
                    <span class="material-symbols-rounded mr-2 text-[20px] text-md-on-surface-variant">cloud</span>
                    <span class="text-[13px] font-google font-medium">Storage Quota</span>
                </div>
                <div class="w-full bg-md-outline/30 rounded-full h-1.5 mb-2 overflow-hidden mx-2">
                    <div id="storageProgressBar" class="bg-md-primary h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div id="storageText" class="text-[12px] text-md-on-surface-variant px-2 font-google">Calculating...</div>
            </div>
        </aside>

        <!-- Main Settings Workspace -->
        <main class="flex-1 bg-md-surface md:rounded-2xl md:mr-4 md:mb-4 flex flex-col overflow-y-auto relative border border-md-outline/30 md:shadow-sm">
            <div class="p-6 md:p-8 max-w-[800px] w-full mx-auto pb-24">
                
                <h1 class="text-[28px] font-google text-md-on-surface mb-8 tracking-[-0.5px]">Settings</h1>
                
                <div class="space-y-10">
                    <section class="flex items-center space-x-6 pb-8 border-b border-md-outline/30">
                        <div class="w-[72px] h-[72px] rounded-full bg-md-primary-container flex items-center justify-center text-3xl text-md-on-primary-container font-google font-medium shrink-0">
                            <span id="settingsInitial">...</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-2xl font-google text-md-on-surface" id="settingsUsername">Loading...</h3>
                            <p class="text-[14px] text-md-on-surface-variant mt-1">Vault Administrator</p>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-[14px] font-google font-medium text-md-on-surface-variant mb-4">Appearance</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3" id="themeSelectors">
                            <label class="theme-card relative flex items-center p-4 border border-md-outline rounded-xl cursor-pointer hover:bg-md-surface-container transition group" data-theme="light">
                                <input type="radio" name="theme" value="light" class="hidden">
                                <span class="icon material-symbols-rounded text-[24px] text-md-on-surface-variant group-hover:text-md-on-surface mr-4">light_mode</span>
                                <span class="text font-google text-[15px] text-md-on-surface-variant group-hover:text-md-on-surface flex-1">Light</span>
                                <span class="check-icon material-symbols-rounded text-md-primary opacity-0 transition-opacity">check_circle</span>
                            </label>

                            <label class="theme-card relative flex items-center p-4 border border-md-outline rounded-xl cursor-pointer hover:bg-md-surface-container transition group" data-theme="dark">
                                <input type="radio" name="theme" value="dark" class="hidden">
                                <span class="icon material-symbols-rounded text-[24px] text-md-on-surface-variant group-hover:text-md-on-surface mr-4">dark_mode</span>
                                <span class="text font-google text-[15px] text-md-on-surface-variant group-hover:text-md-on-surface flex-1">Dark</span>
                                <span class="check-icon material-symbols-rounded text-md-primary opacity-0 transition-opacity">check_circle</span>
                            </label>

                            <label class="theme-card relative flex items-center p-4 border border-md-outline rounded-xl cursor-pointer hover:bg-md-surface-container transition group" data-theme="device">
                                <input type="radio" name="theme" value="device" class="hidden">
                                <span class="icon material-symbols-rounded text-[24px] text-md-on-surface-variant group-hover:text-md-on-surface mr-4">settings_brightness</span>
                                <span class="text font-google text-[15px] text-md-on-surface-variant group-hover:text-md-on-surface flex-1">System</span>
                                <span class="check-icon material-symbols-rounded text-md-primary opacity-0 transition-opacity">check_circle</span>
                            </label>
                        </div>
                    </section>

                    <div class="h-[1px] w-full bg-md-outline/30"></div>

                    <section>
                        <h4 class="text-[14px] font-google font-medium text-md-on-surface-variant mb-6">Security</h4>
                        
                        <div class="max-w-[400px] space-y-4">
                            <div class="relative">
                                <input type="password" id="currentPassword" class="peer w-full h-[56px] bg-transparent border border-md-outline rounded-[4px] px-4 text-md-on-surface focus:border-md-primary focus:border-2 outline-none transition-all placeholder-transparent" placeholder="Current Password">
                                <label class="absolute left-4 top-[16px] text-md-on-surface-variant text-[16px] peer-focus:text-md-primary peer-focus:text-[12px] peer-focus:-translate-y-[26px] peer-focus:bg-md-surface peer-focus:px-1 peer-[:not(:placeholder-shown)]:text-[12px] peer-[:not(:placeholder-shown)]:-translate-y-[26px] peer-[:not(:placeholder-shown)]:bg-md-surface peer-[:not(:placeholder-shown)]:px-1 transition-all pointer-events-none">Current Password</label>
                            </div>

                            <div class="relative">
                                <input type="password" id="newPassword" class="peer w-full h-[56px] bg-transparent border border-md-outline rounded-[4px] px-4 text-md-on-surface focus:border-md-primary focus:border-2 outline-none transition-all placeholder-transparent" placeholder="New Password">
                                <label class="absolute left-4 top-[16px] text-md-on-surface-variant text-[16px] peer-focus:text-md-primary peer-focus:text-[12px] peer-focus:-translate-y-[26px] peer-focus:bg-md-surface peer-focus:px-1 peer-[:not(:placeholder-shown)]:text-[12px] peer-[:not(:placeholder-shown)]:-translate-y-[26px] peer-[:not(:placeholder-shown)]:bg-md-surface peer-[:not(:placeholder-shown)]:px-1 transition-all pointer-events-none">New Password</label>
                            </div>
                            
                            <div class="flex items-center justify-between pt-2">
                                <button id="changePasswordBtn" class="bg-md-primary text-md-on-primary hover:brightness-110 font-google font-medium py-2.5 px-6 rounded-full transition shadow-sm">Update Password</button>
                                <p id="passwordStatus" class="text-[13px] font-medium ml-4"></p>
                            </div>
                        </div>
                    </section>

                    <div class="h-[1px] w-full bg-md-outline/30"></div>

                    <section>
                        <h4 class="text-[14px] font-google font-medium text-md-error mb-4">Account Administration</h4>
                        <div class="flex items-center justify-between py-2">
                            <div>
                                <h5 class="text-[16px] font-google text-md-on-surface">Sign out of this vault</h5>
                                <p class="text-[13px] text-md-on-surface-variant mt-1">End your current session on this device.</p>
                            </div>
                            <button id="logoutSettingsBtn" class="border border-md-outline text-md-error hover:bg-md-error/10 font-google font-medium py-2 px-6 rounded-full transition flex items-center">
                                <span class="material-symbols-rounded mr-2 text-[20px]">logout</span> Sign out
                            </button>
                        </div>
                    </section>

                </div>
            </div>
        </main>
    </div>

    <!-- UI State & Scripts -->
    <script src="/js/state.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            
            try {
                const res = await api.getDrive(); 
                if (res.status === 200) {
                    const uname = res.data.username;
                    document.getElementById('settingsUsername').textContent = uname;
                    document.getElementById('settingsInitial').textContent = uname.charAt(0).toUpperCase();
                    document.getElementById('headerInitial').textContent = uname.charAt(0).toUpperCase();
                    
                    // Boot up the real-time Storage Quota Tracker dynamically
                    if (typeof ui !== 'undefined' && typeof ui.updateStorage === 'function') {
                        ui.updateStorage();
                    }
                } else {
                    window.location.href = '/'; 
                }
            } catch (error) {
                window.location.href = '/'; 
            }

            document.getElementById('logoutSettingsBtn').addEventListener('click', async () => {
                await api.logout();
                window.location.href = '/';
            });

            document.getElementById('changePasswordBtn').addEventListener('click', async () => {
                const currentPass = document.getElementById('currentPassword').value;
                const newPass = document.getElementById('newPassword').value;
                const status = document.getElementById('passwordStatus');
                
                if (!currentPass || !newPass) {
                    status.textContent = "Please fill both fields.";
                    status.className = "text-[13px] font-medium text-md-error ml-4";
                    return;
                }
                
                status.textContent = "Updating...";
                status.className = "text-[13px] font-medium text-md-on-surface-variant ml-4";
                
                const response = await api.updatePassword(currentPass, newPass);
                if (response.status === 200) {
                    status.textContent = "Password updated securely!";
                    status.className = "text-[13px] font-medium text-green-400 ml-4";
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    status.textContent = response.data.error || "Update failed.";
                    status.className = "text-[13px] font-medium text-md-error ml-4";
                }
            });

            const themeInputs = document.querySelectorAll('input[name="theme"]');
            const activeTheme = localStorage.getItem('rcloud_theme') || 'device';

            function updateThemeUI(selectedMode) {
                document.querySelectorAll('.theme-card').forEach(c => {
                    const isSelected = c.getAttribute('data-theme') === selectedMode;
                    const icon = c.querySelector('.icon');
                    const text = c.querySelector('.text');
                    const check = c.querySelector('.check-icon');
                    const radio = c.querySelector('input[type="radio"]');
                    
                    if (radio) radio.checked = isSelected;
                    
                    if (isSelected) {
                        c.className = "theme-card relative flex items-center p-4 border-2 border-md-primary bg-md-surface-container rounded-xl cursor-pointer transition group";
                        icon.className = "icon material-symbols-rounded filled text-[24px] text-md-primary mr-4";
                        text.className = "text font-google font-medium text-[15px] text-md-on-surface flex-1";
                        check.classList.remove('opacity-0');
                    } else {
                        c.className = "theme-card relative flex items-center p-4 border border-md-outline rounded-xl cursor-pointer hover:bg-md-surface-container transition group";
                        icon.className = "icon material-symbols-rounded text-[24px] text-md-on-surface-variant group-hover:text-md-on-surface mr-4";
                        text.className = "text font-google text-[15px] text-md-on-surface-variant group-hover:text-md-on-surface flex-1";
                        check.classList.add('opacity-0');
                    }
                });
            }

            updateThemeUI(activeTheme);

            themeInputs.forEach(input => {
                input.addEventListener('change', (e) => {
                    const selectedTheme = e.target.value;
                    updateThemeUI(selectedTheme);
                    
                    if (typeof theme !== 'undefined' && typeof theme.set === 'function') {
                        theme.set(selectedTheme);
                    } else {
                        localStorage.setItem('rcloud_theme', selectedTheme);
                        window.location.reload();
                    }
                });
            });
        });
    </script>
</body>
</html>
