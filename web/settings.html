<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - R Cloud</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* RESTORED: These must use your CSS variables for theme.js to work */
                        'md-bg': 'var(--md-bg, #131314)', 
                        'md-surface': 'var(--md-surface, #1e1f20)', 
                        'md-hover': 'var(--md-hover, #282a2c)',
                        'md-text': 'var(--md-text, #e3e3e3)', 
                        'md-text-muted': 'var(--md-text-muted, #c4c7c5)', 
                        'md-accent': 'var(--md-accent, #a8c7fa)',
                        'md-active': 'var(--md-active, #004a77)', 
                        'md-fab': 'var(--md-fab, #c2e7ff)', 
                        'md-fab-text': 'var(--md-fab-text, #001d35)'
                    },
                    fontFamily: { 
                        sans: ['Roboto', 'sans-serif'],
                        google: ['"Google Sans"', 'Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <script src="/js/theme.js"></script>
    
    <style>
        body { 
            overscroll-behavior-y: none; 
            background-color: var(--md-bg, #131314);
        }
        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
        }
        .material-symbols-rounded.filled { 
            font-variation-settings: 'FILL' 1; 
        }
        /* M3 Floating Label Text Field Styles */
        .m3-input:focus ~ .m3-label,
        .m3-input:not(:placeholder-shown) ~ .m3-label {
            transform: translateY(-1.1rem) scale(0.75);
            background-color: var(--md-surface, #1e1f20);
            padding: 0 4px;
            color: var(--md-accent, #a8c7fa);
        }
        .m3-input:not(:focus):not(:placeholder-shown) ~ .m3-label {
            color: var(--md-text-muted, #c4c7c5);
        }
        /* Drive-style scrollbar */
        ::-webkit-scrollbar { width: 14px; height: 14px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background-color: var(--md-text-muted, #c4c7c5); 
            border: 4px solid var(--md-surface, #1e1f20);
            border-radius: 8px; 
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover { border: 3px solid var(--md-surface, #1e1f20); }
    </style>
</head>
<body class="bg-md-bg text-md-text font-sans h-screen overflow-hidden flex flex-col selection:bg-md-active selection:text-md-accent">

    <header class="h-[64px] flex items-center justify-between px-4 shrink-0 relative w-full">
        <div class="flex items-center w-[238px] shrink-0">
            <button class="p-2 hover:bg-md-hover rounded-full transition text-md-text flex items-center mr-1">
                <span class="material-symbols-rounded text-[24px]">menu</span>
            </button>
            <div class="flex items-center space-x-2 cursor-pointer rounded-lg px-2 py-1 transition" onclick="window.location.href='/'">
                <span class="material-symbols-rounded filled text-[28px] text-md-accent">cloud</span>
                <span class="text-[22px] font-google font-normal text-md-text tracking-[-0.5px]">R Cloud</span>
            </div>
        </div>
        
        <div class="hidden md:flex flex-1 max-w-[720px] bg-md-hover h-[48px] rounded-full items-center px-2 transition-all mx-4 group border border-transparent focus-within:bg-md-surface focus-within:border-md-text-muted focus-within:shadow-sm">
            <button class="p-2 rounded-full text-md-text-muted group-focus-within:text-md-text flex items-center">
                <span class="material-symbols-rounded">search</span>
            </button>
            <input type="text" placeholder="Search in R Cloud" class="flex-1 bg-transparent border-none outline-none text-md-text placeholder:text-md-text-muted text-[16px] font-sans" disabled>
        </div>

        <div class="flex items-center space-x-2 pr-2 shrink-0">
            <button class="hidden sm:flex p-2 hover:bg-md-hover rounded-full transition text-md-text-muted items-center">
                <span class="material-symbols-rounded">help</span>
            </button>
            <button class="hidden sm:flex p-2 hover:bg-md-hover rounded-full transition text-md-text-muted items-center mr-2">
                <span class="material-symbols-rounded">settings</span>
            </button>
            <div class="w-8 h-8 rounded-full bg-md-active ring-2 ring-transparent hover:ring-md-hover flex items-center justify-center cursor-pointer transition-all">
                <span id="headerInitial" class="text-md-accent font-google font-medium text-sm">U</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden w-full">
        
        <aside class="w-[256px] shrink-0 flex-col hidden md:flex pl-3 pr-4 py-2">
            <button class="w-[105px] h-[56px] bg-md-surface hover:bg-md-hover text-md-text rounded-2xl flex items-center justify-center gap-2 mb-4 transition-all shadow-sm ml-1">
                <span class="material-symbols-rounded text-[24px]">add</span>
                <span class="font-google font-medium text-[14px]">New</span>
            </button>

            <nav class="space-y-1">
                <button onclick="window.location.href='/'" class="w-full flex items-center text-md-text hover:bg-md-hover px-4 py-[10px] rounded-full text-[14px] transition">
                    <span class="material-symbols-rounded mr-3 text-[20px] text-md-text-muted">hard_drive</span> 
                    <span class="font-google">My Drive</span>
                </button>
                <button class="w-full flex items-center bg-md-active text-md-accent px-4 py-[10px] rounded-full text-[14px] transition">
                    <span class="material-symbols-rounded filled mr-3 text-[20px]">settings</span> 
                    <span class="font-google font-medium">Settings</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 bg-md-surface md:rounded-2xl md:mr-4 md:mb-4 flex flex-col overflow-y-auto relative">
            <div class="p-6 md:p-10 max-w-[800px] w-full mx-auto pb-24">
                
                <h1 class="text-[32px] font-google text-md-text mb-10 tracking-[-0.5px]">Settings</h1>
                
                <div class="space-y-12">
                    
                    <section class="flex flex-col sm:flex-row items-center sm:items-start gap-6 pb-10 border-b border-md-hover">
                        <div class="w-20 h-20 rounded-full bg-md-active flex items-center justify-center text-3xl text-md-accent font-google font-medium shrink-0">
                            <span id="settingsInitial">...</span>
                        </div>
                        <div class="text-center sm:text-left flex-1 pt-1">
                            <h3 class="text-[24px] font-google text-md-text" id="settingsUsername">Loading...</h3>
                            <p class="text-[14px] text-md-text-muted mt-1 font-google">Vault Administrator</p>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-[14px] font-google font-medium text-md-text-muted mb-5 tracking-wide uppercase">Appearance</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="themeSelectors">
                            
                            <label class="theme-card relative flex flex-col items-center justify-center p-6 border border-md-hover hover:border-md-text-muted rounded-2xl cursor-pointer transition group" data-theme="light">
                                <input type="radio" name="theme" value="light" class="hidden">
                                <span class="icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3 transition-colors">light_mode</span>
                                <span class="text font-google font-medium text-sm text-md-text-muted group-hover:text-md-text transition-colors">Light</span>
                            </label>

                            <label class="theme-card relative flex flex-col items-center justify-center p-6 border border-md-hover hover:border-md-text-muted rounded-2xl cursor-pointer transition group" data-theme="dark">
                                <input type="radio" name="theme" value="dark" class="hidden">
                                <span class="icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3 transition-colors">dark_mode</span>
                                <span class="text font-google font-medium text-sm text-md-text-muted group-hover:text-md-text transition-colors">Dark</span>
                            </label>

                            <label class="theme-card relative flex flex-col items-center justify-center p-6 border border-md-hover hover:border-md-text-muted rounded-2xl cursor-pointer transition group" data-theme="device">
                                <input type="radio" name="theme" value="device" class="hidden">
                                <span class="icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3 transition-colors">settings_brightness</span>
                                <span class="text font-google font-medium text-sm text-md-text-muted group-hover:text-md-text transition-colors">System</span>
                            </label>

                        </div>
                    </section>

                    <div class="h-[1px] w-full bg-md-hover"></div>

                    <section>
                        <h4 class="text-[14px] font-google font-medium text-md-text-muted mb-6 tracking-wide uppercase">Security</h4>
                        
                        <div class="max-w-[420px] space-y-5">
                            
                            <div class="relative mt-2">
                                <input type="password" id="currentPassword" class="m3-input w-full h-[56px] bg-transparent border border-md-text-muted rounded-[4px] px-4 text-[16px] text-md-text focus:border-md-accent focus:border-2 outline-none transition-all placeholder-transparent" placeholder="Current Password">
                                <label class="m3-label absolute left-3 top-[16px] text-md-text-muted text-[16px] font-sans transition-all pointer-events-none origin-left">Current Password</label>
                            </div>

                            <div class="relative">
                                <input type="password" id="newPassword" class="m3-input w-full h-[56px] bg-transparent border border-md-text-muted rounded-[4px] px-4 text-[16px] text-md-text focus:border-md-accent focus:border-2 outline-none transition-all placeholder-transparent" placeholder="New Password">
                                <label class="m3-label absolute left-3 top-[16px] text-md-text-muted text-[16px] font-sans transition-all pointer-events-none origin-left">New Password</label>
                            </div>
                            
                            <div class="flex items-center justify-between pt-3">
                                <button id="changePasswordBtn" class="bg-md-accent text-md-fab-text hover:opacity-90 font-google font-medium py-2.5 px-6 rounded-full transition shadow-sm h-[40px] flex items-center justify-center">
                                    Update password
                                </button>
                                <p id="passwordStatus" class="text-[14px] font-google font-medium ml-4 h-[20px]"></p>
                            </div>
                        </div>
                    </section>

                    <div class="h-[1px] w-full bg-md-hover"></div>

                    <section>
                        <h4 class="text-[14px] font-google font-medium text-red-400 mb-5 tracking-wide uppercase">Account Access</h4>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between py-2 gap-4">
                            <div>
                                <h5 class="text-[16px] font-google text-md-text">Sign out of R Cloud</h5>
                                <p class="text-[14px] font-sans text-md-text-muted mt-1">End your current secure vault session on this device.</p>
                            </div>
                            <button id="logoutSettingsBtn" class="border border-md-text-muted text-red-400 hover:bg-red-400/10 hover:border-red-400 font-google font-medium py-2 px-6 rounded-full transition flex items-center h-[40px]">
                                <span class="material-symbols-rounded mr-2 text-[20px]">logout</span> Sign out
                            </button>
                        </div>
                    </section>

                </div>
            </div>
        </main>
    </div>

    <script src="/js/state.js"></script>
    <script src="/js/api.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            
            // 1. Fetch User Data
            try {
                const res = await api.getDrive(); 
                if (res.status === 200) {
                    const uname = res.data.username;
                    document.getElementById('settingsUsername').textContent = uname;
                    document.getElementById('settingsInitial').textContent = uname.charAt(0).toUpperCase();
                    document.getElementById('headerInitial').textContent = uname.charAt(0).toUpperCase();
                } else {
                    window.location.href = '/'; 
                }
            } catch (error) {
                window.location.href = '/'; 
            }

            // 2. Logout Handler
            document.getElementById('logoutSettingsBtn').addEventListener('click', async () => {
                await api.logout();
                window.location.href = '/';
            });

            // 3. Password Handler
            document.getElementById('changePasswordBtn').addEventListener('click', async () => {
                const currentPass = document.getElementById('currentPassword').value;
                const newPass = document.getElementById('newPassword').value;
                const status = document.getElementById('passwordStatus');
                
                if (!currentPass || !newPass) {
                    status.textContent = "Please fill both fields.";
                    status.className = "text-[14px] font-google font-medium text-red-400 ml-4";
                    return;
                }
                
                status.textContent = "Updating...";
                status.className = "text-[14px] font-google font-medium text-md-text-muted ml-4";
                
                const response = await api.updatePassword(currentPass, newPass);
                if (response.status === 200) {
                    status.textContent = "Password updated securely.";
                    status.className = "text-[14px] font-google font-medium text-green-400 ml-4";
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    status.textContent = response.data.error || "Update failed.";
                    status.className = "text-[14px] font-google font-medium text-red-400 ml-4";
                }
            });

            // 4. Fixed Theme Switching Logic
            const themeCards = document.querySelectorAll('.theme-card');
            const activeTheme = localStorage.getItem('rcloud_theme') || 'device';

            function updateThemeUI(selectedMode) {
                themeCards.forEach(c => {
                    const isSelected = c.getAttribute('data-theme') === selectedMode;
                    const icon = c.querySelector('.icon');
                    const text = c.querySelector('.text');
                    
                    // Style adjustments based on selection
                    if (isSelected) {
                        c.className = "theme-card relative flex flex-col items-center justify-center p-6 border-2 border-md-accent bg-md-active/20 rounded-2xl cursor-pointer transition group";
                        icon.className = "icon material-symbols-rounded filled text-[32px] text-md-accent mb-3 transition-colors";
                        text.className = "text font-google font-medium text-sm text-md-accent transition-colors";
                        c.querySelector('input').checked = true;
                    } else {
                        c.className = "theme-card relative flex flex-col items-center justify-center p-6 border border-md-hover hover:border-md-text-muted hover:bg-md-hover/50 rounded-2xl cursor-pointer transition group";
                        icon.className = "icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3 transition-colors";
                        text.className = "text font-google font-medium text-sm text-md-text-muted group-hover:text-md-text transition-colors";
                    }
                });
            }

            // Initialize UI
            updateThemeUI(activeTheme);

            // Execute theme selection
            themeCards.forEach(card => {
                card.addEventListener('click', (e) => {
                    // Prevent double-firing if the inner input is clicked directly
                    if(e.target.tagName.toLowerCase() === 'input' && e.type === 'click') return;
                    
                    const selectedTheme = card.getAttribute('data-theme');
                    updateThemeUI(selectedTheme);
                    
                    if (typeof theme !== 'undefined' && typeof theme.set === 'function') {
                        theme.set(selectedTheme); 
                        // Because we restored var(--md-bg) in Tailwind, theme.set() will work dynamically now!
                    } else {
                        localStorage.setItem('rcloud_theme', selectedTheme);
                        window.location.reload();
                    }
                });
            });
        });
    </script>
</body>
</html>
