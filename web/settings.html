<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - R Cloud</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'md-bg': 'var(--md-bg, #131314)', 'md-surface': 'var(--md-surface, #1e1f20)', 'md-hover': 'var(--md-hover, #282a2c)',
                        'md-text': 'var(--md-text, #e3e3e3)', 'md-text-muted': 'var(--md-text-muted, #c4c7c5)', 'md-accent': 'var(--md-accent, #a8c7fa)',
                        'md-active': 'var(--md-active, #004a77)', 'md-fab': 'var(--md-fab, #c2e7ff)', 'md-fab-text': 'var(--md-fab-text, #001d35)'
                    },
                    fontFamily: { sans: ['Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="/js/theme.js"></script>
    <style>
        body { letter-spacing: 0.01em; }
        .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-rounded.filled { font-variation-settings: 'FILL' 1; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444746; border-radius: 10px; }
    </style>
</head>
<body class="bg-md-bg text-md-text font-sans h-screen overflow-hidden flex flex-col selection:bg-md-active selection:text-md-accent relative">

    <header class="h-[64px] flex items-center justify-between px-2 md:px-4 shrink-0 relative border-b border-md-bg/30">
        <div class="flex items-center space-x-2 w-auto md:w-64">
            <button onclick="window.location.href='/'" class="p-2 hover:bg-md-hover rounded-full transition text-md-text md:hidden flex items-center"><span class="material-symbols-rounded">arrow_back</span></button>
            <div class="flex items-center space-x-2 pl-2 cursor-pointer" onclick="window.location.href='/'">
                <span class="text-[22px] font-medium text-md-text hidden sm:block">R Cloud</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-1 pr-2">
            <div class="w-9 h-9 ml-2 rounded-full bg-[#004a77] flex items-center justify-center ring-2 ring-md-accent transition">
                <span id="headerInitial" class="text-md-accent font-medium text-sm">U</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <aside class="w-64 shrink-0 flex-col hidden md:flex">
            <nav class="flex-1 px-3 space-y-1 mt-6">
                <button onclick="window.location.href='/'" class="w-full flex items-center text-md-text hover:bg-md-hover px-4 py-2.5 rounded-full font-medium text-[14px] transition">
                    <span class="material-symbols-rounded mr-3 text-md-text-muted">hard_drive</span> My Drive
                </button>
                <button class="w-full flex items-center bg-md-active text-md-accent px-4 py-2.5 rounded-full font-medium text-[14px] transition mt-2">
                    <span class="material-symbols-rounded filled mr-3">settings</span> Settings
                </button>
            </nav>
        </aside>

        <main class="flex-1 bg-md-surface md:rounded-[24px] md:m-2 md:mt-0 md:mr-4 flex flex-col overflow-y-auto relative shadow-sm">
            <div class="shrink-0 px-6 py-4 flex items-center text-[18px] text-md-text border-b border-md-bg/30">
                <h2 class="font-medium text-[18px]">Settings</h2>
            </div>

            <div class="p-6 max-w-4xl mx-auto w-full space-y-8 pb-20">
                
                <section class="flex flex-col sm:flex-row items-center sm:items-start space-y-4 sm:space-y-0 sm:space-x-6 bg-md-bg border border-[#444746] rounded-[24px] p-6 shadow-sm">
                    <div class="w-20 h-20 rounded-full bg-[#004a77] flex items-center justify-center text-3xl text-md-accent font-medium shrink-0">
                        <span id="settingsInitial">...</span>
                    </div>
                    <div class="text-center sm:text-left flex-1">
                        <h3 class="text-2xl font-medium text-md-text" id="settingsUsername">Loading...</h3>
                        <p class="text-md-text-muted mt-1">Vault Administrator</p>
                    </div>
                </section>

                <section>
                    <h4 class="text-sm font-medium text-md-text-muted uppercase tracking-wider mb-4 ml-2">Appearance</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="themeSelectors">
                        <label class="theme-card flex flex-col items-center justify-center p-6 border border-[#444746] rounded-[16px] cursor-pointer hover:bg-md-hover transition group" data-theme="light">
                            <input type="radio" name="theme" value="light" class="hidden">
                            <span class="icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3">light_mode</span>
                            <span class="text font-medium text-sm text-md-text-muted group-hover:text-md-text">Light</span>
                        </label>

                        <label class="theme-card flex flex-col items-center justify-center p-6 border border-md-accent bg-[#004a77]/20 rounded-[16px] cursor-pointer transition group" data-theme="dark">
                            <input type="radio" name="theme" value="dark" class="hidden" checked>
                            <span class="icon material-symbols-rounded filled text-[32px] text-md-accent mb-3">dark_mode</span>
                            <span class="text font-medium text-sm text-md-accent">Dark</span>
                        </label>

                        <label class="theme-card flex flex-col items-center justify-center p-6 border border-[#444746] rounded-[16px] cursor-pointer hover:bg-md-hover transition group" data-theme="device">
                            <input type="radio" name="theme" value="device" class="hidden">
                            <span class="icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3">settings_brightness</span>
                            <span class="text font-medium text-sm text-md-text-muted group-hover:text-md-text">Device System</span>
                        </label>
                    </div>
                </section>

                <section>
                    <h4 class="text-sm font-medium text-md-text-muted uppercase tracking-wider mb-4 ml-2">Security</h4>
                    <div class="bg-md-bg border border-[#444746] rounded-[24px] p-6 space-y-4 shadow-sm">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <input type="password" id="currentPassword" class="flex-1 bg-md-surface border border-[#444746] rounded-[12px] py-3 px-4 text-md-text focus:outline-none focus:border-md-accent focus:border-2 transition-all" placeholder="Current Password">
                            <input type="password" id="newPassword" class="flex-1 bg-md-surface border border-[#444746] rounded-[12px] py-3 px-4 text-md-text focus:outline-none focus:border-md-accent focus:border-2 transition-all" placeholder="New Password">
                        </div>
                        <div class="flex items-center justify-between pt-2">
                            <p id="passwordStatus" class="text-sm font-medium h-4"></p>
                            <button id="changePasswordBtn" class="bg-md-active text-md-accent hover:bg-[#005a8f] font-medium py-2.5 px-6 rounded-full transition shrink-0 shadow">Update Password</button>
                        </div>
                    </div>
                </section>

                <section>
                    <h4 class="text-sm font-medium text-red-400 uppercase tracking-wider mb-4 ml-2">Account Actions</h4>
                    <div class="bg-md-bg border border-red-400/30 rounded-[24px] p-6 flex flex-col sm:flex-row items-center justify-between shadow-sm gap-4">
                        <div class="text-center sm:text-left">
                            <h5 class="text-lg font-medium text-md-text">Sign out</h5>
                            <p class="text-md-text-muted text-sm mt-1">Securely terminate your vault session on this device.</p>
                        </div>
                        <button id="logoutSettingsBtn" class="bg-red-400/10 text-red-400 border border-red-400/50 hover:bg-red-400 hover:text-[#131314] font-medium py-2.5 px-6 rounded-full transition shrink-0 flex items-center shadow-sm">
                            <span class="material-symbols-rounded mr-2">logout</span> Logout
                        </button>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const res = await api.getDrive(); 
            if (res.status === 200) {
                const uname = res.data.username;
                document.getElementById('settingsUsername').textContent = uname;
                document.getElementById('settingsInitial').textContent = uname.charAt(0).toUpperCase();
                document.getElementById('headerInitial').textContent = uname.charAt(0).toUpperCase();
            } else {
                window.location.href = '/'; 
            }

            // NEW: Relocated Logout Handler
            document.getElementById('logoutSettingsBtn').addEventListener('click', async () => {
                await api.logout();
                window.location.href = '/';
            });

            document.getElementById('changePasswordBtn').addEventListener('click', async () => {
                const currentPass = document.getElementById('currentPassword').value;
                const newPass = document.getElementById('newPassword').value;
                const status = document.getElementById('passwordStatus');
                
                if (!currentPass || !newPass) {
                    status.textContent = "Please fill both fields.";
                    status.className = "text-sm font-medium h-4 text-red-400";
                    return;
                }
                
                status.textContent = "Updating...";
                status.className = "text-sm font-medium h-4 text-md-text-muted";
                
                const response = await api.updatePassword(currentPass, newPass);
                if (response.status === 200) {
                    status.textContent = "Password updated securely!";
                    status.className = "text-sm font-medium h-4 text-green-400";
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    status.textContent = response.data.error || "Update failed.";
                    status.className = "text-sm font-medium h-4 text-red-400";
                }
            });

            const themeCards = document.querySelectorAll('.theme-card');
            const activeTheme = localStorage.getItem('rcloud_theme') || 'device';

            function updateThemeUI(selectedMode) {
                themeCards.forEach(c => {
                    const isSelected = c.getAttribute('data-theme') === selectedMode;
                    
                    c.className = isSelected 
                        ? "theme-card flex flex-col items-center justify-center p-6 border border-md-accent bg-[#004a77]/20 rounded-[16px] cursor-pointer transition group"
                        : "theme-card flex flex-col items-center justify-center p-6 border border-[#444746] rounded-[16px] cursor-pointer hover:bg-md-hover transition group";
                    
                    c.querySelector('.icon').className = isSelected
                        ? "icon material-symbols-rounded filled text-[32px] text-md-accent mb-3"
                        : "icon material-symbols-rounded text-[32px] text-md-text-muted group-hover:text-md-text mb-3";
                        
                    c.querySelector('.text').className = isSelected
                        ? "text font-medium text-sm text-md-accent"
                        : "text font-medium text-sm text-md-text-muted group-hover:text-md-text";
                });
            }

            updateThemeUI(activeTheme);

            themeCards.forEach(card => {
                card.addEventListener('click', () => {
                    const selectedTheme = card.getAttribute('data-theme');
                    theme.set(selectedTheme);
                    updateThemeUI(selectedTheme);
                });
            });
        });
    </script>
</body>
</html>
